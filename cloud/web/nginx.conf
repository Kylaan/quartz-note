server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 目录补斜杠等内部跳转用「相对」Location，避免丢失端口/被反代改写
    absolute_redirect off;

    # Quartz 把 ![[x.html]] 动画当静态资源拷贝时会去掉 .html 后缀 → 文件名无扩展名，
    # 默认会被当 octet-stream（iframe 里会变成下载）。无扩展名的就按 HTML 渲染。
    # 有正常扩展名的（svg/png/pdf/css…）仍走 mime.types，不受影响。
    default_type text/html;

    # Quartz 用「干净链接」（无 .html 后缀），需要 try_files 兜底解析
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
    # 命中不到时返回 Quartz 自带的 404 页（且状态码是真正的 404）
    error_page 404 /404.html;

    # 静态资源缓存
    location ~* \.(css|js|woff2?|png|jpe?g|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
